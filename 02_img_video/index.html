<!DOCTYPE html>
<!-- Declara el tipo de documento. Indica al navegador que usará HTML5 -->
<html lang="es">
<!--Elemento principal del documento HTML.
lang="es" indica que el contenido está en "español" -->

<head> <!--Sección de configuración del documento -->
    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres.
    UTF-8 permite usar corretamente tildes, ñ, simbolos, etc -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que el sitio sea responsive.
    Permite que el diseño se adapte correctamente a celulaares y tablets -->
    <title>Practicando HTML - img y video</title>
    <!-- Título que aparece en el navegador -->
    <meta name="author" content="Jeremías">
    <!-- Indica quien creo el sitio web-->

    <link rel="stylesheet" href="static/css/style.css">
    <!-- Conexión con hoja CSS de estilos -->
</head>

<body>
    <header> <!-- Encabezado del documento -->
        <h1>Sitio multimedia personal</h1>
    </header>
    <hr> <!-- Crea una línea de división -->
    <main> <!-- Sección principal del documento -->
        <h2> Mis datos:</h2>
        <p>Nombre: Jeremías Gaete <br> <!-- Es un salto de línea -->
            Curso: 3°C
        </p>
        <hr>
        <h2>Galería multimedia</h2>
        <p>Imágen de ejemplo</p>
        <img src="static/images/imagen4.png" alt="primera imagen" width="300">
        <img src="static/images/imagen2.png" alt="primera imagen" width="300">
        <img src="static/images/imagen3.png" alt="primera imagen" width="300">
        <hr>
        <h2>Video</h2>
        <video width="600" controls>
            <source src="static/video/Video1.mp4" type="video/mp4">
        </video>
        <video width="600" controls>
        </video>
    </main>
    <footer>
        <p style="text-align:center">Todos los derechos reservados
            -<a href="https://www.wikidex.net/wiki/Tipo_fantasma">Más información</a> <!-- etiqueta <a> para vínculos -->
        </p>
    </footer>
</body>

</html>
